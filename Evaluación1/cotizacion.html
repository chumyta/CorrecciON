      <h2>Cotización de Suplementos Deportivos</h2>
      <p>
        Completa el formulario para enviarte una propuesta personalizada para tu
        entrenamiento.
      </p>

      <form
        action="#"
        method="POST"
        class="row g-3 shadow p-4 rounded bg-white"
      >
        <div class="col-md-6">
          <label for="nombre" class="form-label">Nombre del Deportista:</label>
          <input
            type="text"
            class="form-control"
            id="nombre"
            name="nombre"
            placeholder="Ej: Michi Entrenador"
            required
          />
        </div>

        <div class="col-md-6">
          <label for="correo" class="form-label">Correo Electrónico:</label>
          <input
            type="email"
            class="form-control"
            id="correo"
            name="correo"
            placeholder="correo@ejemplo.com"
            required
          />
        </div>

        <div class="col-md-4">
          <label for="edad" class="form-label">Edad del Gato (años):</label>
          <input
            type="number"
            class="form-control"
            id="edad"
            name="edad"
            min="1"
            max="25"
            required
          />
        </div>

        <div class="col-md-4">
          <label for="fecha" class="form-label"
            >Fecha Preferida de Entrega:</label
          >
          <input
            type="date"
            class="form-control"
            id="fecha"
            name="fecha"
            required
          />
        </div>

        <div class="col-md-4">
          <label for="suplemento" class="form-label"
            >Suplemento Principal:</label
          >
          <select
            id="suplemento"
            name="suplemento"
            class="form-select"
            required
          >
            <option value="" selected disabled>Selecciona uno...</option>
            <option value="proteina">Proteína de tigre</option>
            <option value="creatina">Creatina gatuuuuu"</option>
          </select>
        </div>

        <div class="col-12">
          <label class="form-label d-block">Nivel de Actividad Física:</label>
          <div class="form-check form-check-inline">
            <input
              class="form-check-input"
              type="radio"
              name="nivel"
              id="sedentario"
              value="sedentario"
              required
            />
            <label class="form-check-label" for="sedentario"
              >Sedentario (Dormir 20hrs)</label
            >
          </div>
          <div class="form-check form-check-inline">
            <input
              class="form-check-input"
              type="radio"
              name="nivel"
              id="activo"
              value="activo"
              required
            />
            <label class="form-check-label" for="activo"
              >Cazador de Láser (Activo)</label
            >
          </div>
        </div>

        <div class="col-md-12">
          <label for="archivo" class="form-label"
            >Subir foto del Michi o Receta (Opcional pero requerido
            aquí):</label
          >
          <input
            type="file"
            class="form-control"
            id="archivo"
            name="archivo"
            required
          />
        </div>

        <div class="col-12 mt-4">
          <button type="submit" class="btn btn-primary btn-lg w-100">
            Enviar Solicitud 🐾
          </button>
        </div>
      </form>
