    <main class="container my-5 text-center">
      <section class="mb-4">
        <img src="img/GatoASI.png" width="550" height="300" class="img-fluid rounded shadow-sm mb-4" alt="Contacto" />
        <h2 class="fw-bold" style="color: #FF5722;">¿Necesitas ayuda?</h2>
        <p class="lead">Proporcione sus datos y nos pondremos en contacto con usted a la brevedad 👍</p>
      </section>

      <section class="row justify-content-center">
        <div class="col-md-6 text-start">
          <div class="card shadow p-4 border-0">
            <form action="/action_page.php">
              
              <div class="mb-3">
                <label for="fname" class="form-label fw-bold">Nombre completo:</label>
                <input type="text" class="form-control" id="fname" name="fname" placeholder="Ej: Domingo Zamorano" required />
              </div>

              <div class="mb-3">
                <label for="mail" class="form-label fw-bold">Correo electrónico:</label>
                <input type="email" class="form-control" id="mail" name="mail" placeholder="nombre@correo.com" required />
              </div>

              <div class="mb-3">
                <label for="motivo" class="form-label fw-bold">Motivo del contacto:</label>
                <textarea class="form-control" id="motivo" name="motivo" rows="3" placeholder="Escribe aquí tu duda o consulta..." required></textarea>
              </div>

              <div class="d-grid">
                <button class="btn btn-primary btn-lg" type="submit" style="background-color: #FF5722; border: none;">
                  Enviar Mensaje 🐾
                </button>
              </div>

            </form>
          </div>
        </div>
      </section>

      <section class="mt-5">
        <p class="text-muted">
          📍 Rancagua, Chile | 📞 +56 9 1234 5678 | 📧 contacto@chumysport.cl
